</head>
<body>
  <!-- 🛑 Noscript Google Tag Manager -->

  </noscript>

  <!-- 🌌 ЖИВИЙ ФОН: неонова сітка + світлові вузли мережі -->

    <div class="api-bg__grid"></div>
    <div class="api-bg__glow api-bg__glow--1"></div>
    <div class="api-bg__glow api-bg__glow--2"></div>
    <div class="api-bg__nodes">
      <span style="--x:12%;--y:22%;--d:0s"></span>
      <span style="--x:78%;--y:16%;--d:1.4s"></span>
      <span style="--x:40%;--y:64%;--d:2.1s"></span>
      <span style="--x:88%;--y:72%;--d:.7s"></span>
      <span style="--x:25%;--y:84%;--d:3.2s"></span>
      <span style="--x:62%;--y:40%;--d:2.6s"></span>
      <span style="--x:6%;--y:54%;--d:1.1s"></span>
      <span style="--x:54%;--y:8%;--d:3.8s"></span>
    </div>
  </div>

  <!-- 🔝 НАВІГАЦІЯ -->
  <header class="header">
    <nav class="navbar">
      <div class="navbar-container">
        <div class="burger" id="burger">&#9776;</div>
        <a class="logo" href="index.html">MyCompany</a>
        <ul class="nav-links" id="navLinks">
          <li><a href="api.html" class="active">API</a></li>
          <li><a href="substitution.html">Підміна</a></li>
          <li><a href="index.html#form">Форма</a></li>
          <li><a href="index.html#contact">Контакти</a></li>
        </ul>
        <a class="phone-icon" href="tel:+380000000000" id="phoneIcon">&#9743;</a>
      </div>
    </nav>
  </header>

  <!-- ===================== API КОНСОЛЬ ===================== -->
  <main class="api-console">

    <!-- Заголовок секції -->
    <header class="api-console__head">
      <span class="api-console__eyebrow">REST · CALL CONTROL</span>
      <h1 class="api-console__title">Консоль з'єднань</h1>
      <p class="api-console__lead">
        Тестові ендпоінти для з'єднання номерів зі схемами переадресації та SIP-акаунтами.
        Натисніть на заголовок картки, щоб згорнути її.
      </p>
    </header>

    <!-- Сітка форм. Щоб додати нову форму — просто скопіюй один <div class="api-form-container"> блок. -->
    <section class="api-forms-wrapper">

      <!-- ╔════ ФОРМА 1: СХЕМА ════╗ -->
      <div class="api-form-container reveal" data-open="false">
        <button type="button" class="api-form-toggle" aria-expanded="false">
          <h2>З'єднання номеру і схеми переадресації</h2>
          <span class="api-form-chev" aria-hidden="true">›</span>
        </button>

        <div class="api-form-body">
          <div class="api-row">
            <div class="api-field api-field--full">
              <label for="phone3">Введіть номер</label>
              <input id="phone3" name="phone3" type="tel" placeholder="+380..." required />
            </div>

            <div class="api-field api-field--full">
              <label for="authKey3">Auth key</label>
              <input id="authKey3" name="authKey3" type="text" placeholder="Ваш Auth-key" required />
            </div>

            <div class="api-field">
              <label for="projectId3">ID проєкту</label>
              <input id="projectId3" name="projectId3" type="text" placeholder="ID проєкту" required />
            </div>

            <div class="api-field">
              <label for="schemeId3">ID схеми</label>
              <input id="schemeId3" name="schemeId3" type="text" placeholder="ID схеми" required />
            </div>

            <div class="api-field">
              <label for="direction3">Напрямок дзвінка</label>
              <select id="direction3" name="direction3" required>
                <option value="0">Клієнт &#x27A1; Схема</option>
                <option value="1">Схема &#x27A1; Клієнт</option>
              </select>
            </div>

            <div class="api-field">
              <label for="callType3">Тип дзвінка</label>
              <select id="callType3" name="callType3" required>
                <option value="in">Вхідний</option>
                <option value="out">Вихідний</option>
              </select>
            </div>
          </div>

          <button class="fancy-button" id="connectButton3">З'єднати з схемою</button>
        </div>
      </div>

      <!-- ╔════ ФОРМА 2: SIP ════╗ -->
      <div class="api-form-container reveal" data-open="false">
        <button type="button" class="api-form-toggle" aria-expanded="false">
          <h2>З'єднання номеру і SIP акаунта</h2>
          <span class="api-form-chev" aria-hidden="true">›</span>
        </button>

        <div class="api-form-body">
          <div class="api-row">
            <div class="api-field api-field--full">
              <label for="phone4">Введіть номер</label>
              <input id="phone4" name="phone4" type="tel" placeholder="+380..." required />
            </div>

            <div class="api-field api-field--full">
              <label for="authKey4">Auth key</label>
              <input id="authKey4" name="authKey4" type="text" placeholder="Ваш Auth-key" required />
            </div>

            <div class="api-field">
              <label for="projectId4">ID проєкту</label>
              <input id="projectId4" name="projectId4" type="text" placeholder="ID проєкту" required />
            </div>

            <div class="api-field">
              <label for="sipLogin4">SIP login</label>
              <input id="sipLogin4" name="sipLogin4" type="text" placeholder="SIP login" required />
            </div>

            <div class="api-field">
              <label for="direction4">Напрямок дзвінка</label>
              <select id="direction4" name="direction4" required>
                <option value="0">Клієнт &#x27A1; Менеджер</option>
                <option value="1">Менеджер &#x27A1; Клієнт</option>
              </select>
            </div>

            <div class="api-field">
              <label for="callType4">Тип дзвінка</label>
              <select id="callType4" name="callType4" required>
                <option value="in">Вхідний</option>
                <option value="out">Вихідний</option>
              </select>
            </div>
          </div>

          <button class="fancy-button" id="connectButton4">З'єднати через SIP</button>
        </div>
      </div>

    </section>
  </main>

  <!-- 🔚 ФУТЕР -->
  <footer class="footer">
    <p>Зв’яжіться з нами: <a href="tel:+380970000000">+380970000000</a></p>
  </footer>

  <!-- Згортання/розгортання карток. Бекенд (script.js) не чіпаємо. -->
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var cards = document.querySelectorAll('.api-form-container');

      // --- Згортання карток ---
      cards.forEach(function (card) {
        var toggle = card.querySelector('.api-form-toggle');
        if (!toggle) return;
        toggle.addEventListener('click', function () {
          var open = card.getAttribute('data-open') === 'true';
          card.setAttribute('data-open', String(!open));
          toggle.setAttribute('aria-expanded', String(!open));
        });
      });

      // --- Поява карток при скролі (staggered) ---
      var reveals = document.querySelectorAll('.reveal');
      if ('IntersectionObserver' in window) {
        var io = new IntersectionObserver(function (entries) {
          entries.forEach(function (entry) {
            if (entry.isIntersecting) {
              entry.target.classList.add('is-visible');
              io.unobserve(entry.target);
            }
          });
        }, { threshold: 0.12, rootMargin: '0px 0px -8% 0px' });

        reveals.forEach(function (el, i) {
          el.style.setProperty('--reveal-delay', (i * 0.12) + 's');
          io.observe(el);
        });
      } else {
        // Фолбек: без підтримки — просто показуємо
        reveals.forEach(function (el) { el.classList.add('is-visible'); });
      }
    });
  </script>
</body>
</html>
