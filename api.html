  <section class="api-forms-wrapper">

    <div class="api-form-container">
      <h2>З'єднання номеру і схеми переадресації</h2>

      <label for="phone3">Введіть номер</label>
      <input id="phone3" name="phone3" type="tel" placeholder="+380..." required />

      <label for="authKey3">Auth key</label>
      <input id="authKey3" name="authKey3" type="text" placeholder="Ваш Auth-key" required />

      <label for="projectId3">ID проєкту</label>
      <input id="projectId3" name="projectId3" type="text" placeholder="ID проєкту" required />

      <label for="schemeId3">ID схеми</label>
      <input id="schemeId3" name="schemeId3" type="text" placeholder="ID схеми" required />

      <label for="direction3">Напрямок дзвінка</label>
      <select id="direction3" name="direction3" required>
        <option value="0">Клієнт &#x27A1; Схема</option>
        <option value="1">Схема &#x27A1; Клієнт</option>
      </select>

      <label for="callType3">Тип дзвінка</label>
      <select id="callType3" name="callType3" required>
        <option value="in">Вхідний</option>
        <option value="out">Вихідний</option>
      </select>

      <button class="fancy-button" id="connectButton3">З'єднати з схемою</button>
    </div>

    <div class="api-form-container">
      <h2>З'єднання номеру і SIP акаунта</h2>

      <label for="phone4">Введіть номер</label>
      <input id="phone4" name="phone4" type="tel" placeholder="+380..." required />

      <label for="authKey4">Auth key</label>
      <input id="authKey4" name="authKey4" type="text" placeholder="Ваш Auth-key" required />

      <label for="projectId4">ID проєкту</label>
      <input id="projectId4" name="projectId4" type="text" placeholder="ID проєкту" required />

      <label for="sipLogin4">SIP login</label>
      <input id="sipLogin4" name="sipLogin4" type="text" placeholder="SIP login" required />

      <label for="direction4">Напрямок дзвінка</label>
      <select id="direction4" name="direction4" required>
        <option value="0">Клієнт &#x27A1; Менеджер</option>
        <option value="1">Менеджер &#x27A1; Клієнт</option>
      </select>

      <label for="callType4">Тип дзвінка</label>
      <select id="callType4" name="callType4" required>
        <option value="in">Вхідний</option>
        <option value="out">Вихідний</option>
      </select>

      <button class="fancy-button" id="connectButton4">З'єднати через SIP</button>
    </div>

  </section>
