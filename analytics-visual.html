<!--
  ANALYTICS-VISUAL · самостійний фрагмент
  ────────────────────────────────────────────
  Підключення:
    <link rel="stylesheet" href="styles/analytics-visual.css">

  Вставити в кінець <div class="analytics-text" id="analytics">.
  Анімація чисто CSS, скрипти НЕ потрібні.
-->

<div class="analytics-visual" aria-hidden="true">

  <!-- Header bar -->
  <div class="analytics-visual__head">
    <span class="analytics-visual__head-left">CALL-TRACKING · LIVE</span>
    <span class="analytics-visual__head-right">↗ +18.4%</span>
  </div>

  <!-- Donut + legend -->
  <div class="analytics-visual__donut">
    <svg viewBox="0 0 100 100">
      <circle class="av-track" cx="50" cy="50" r="42"></circle>
      <circle class="av-seg av-seg-1" cx="50" cy="50" r="42"></circle>
      <circle class="av-seg av-seg-2" cx="50" cy="50" r="42"></circle>
      <circle class="av-seg av-seg-3" cx="50" cy="50" r="42"></circle>
      <circle class="av-seg av-seg-4" cx="50" cy="50" r="42"></circle>
    </svg>
    <div class="analytics-visual__donut-center">
      <b>847</b>
      <small>дзвінків</small>
    </div>

    <div class="analytics-visual__legend">
      <span class="lg-1">Google Ads <b>40%</b></span>
      <span class="lg-2">Прямі <b>25%</b></span>
      <span class="lg-3">Facebook <b>15%</b></span>
      <span class="lg-4">Інші <b>20%</b></span>
    </div>
  </div>

  <!-- KPI tiles -->
  <div class="analytics-visual__kpis">
    <div class="analytics-visual__kpi">
      <small>Конверсія</small>
      <b>12.4%</b>
      <em class="up">2.1%</em>
    </div>
    <div class="analytics-visual__kpi">
      <small>Сер. час</small>
      <b>3:42</b>
      <em class="up">0:18</em>
    </div>
    <div class="analytics-visual__kpi">
      <small>Пропущені</small>
      <b>4.1%</b>
      <em class="down">1.3%</em>
    </div>
    <div class="analytics-visual__kpi">
      <small>CPL</small>
      <b>$8.20</b>
      <em class="up">$0.40</em>
    </div>
  </div>

  <!-- Sparkline chart -->
  <div class="analytics-visual__chart">
    <div class="analytics-visual__chart-head">
      <span>Дзвінки / 7 днів</span>
      <b>+24%</b>
    </div>
    <svg viewBox="0 0 300 64" preserveAspectRatio="none">
      <defs>
        <linearGradient id="av-grad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"  stop-color="#ff5b22" stop-opacity="0.25"/>
          <stop offset="100%" stop-color="#ff5b22" stop-opacity="0"/>
        </linearGradient>
      </defs>

      <!-- grid -->
      <line class="av-grid" x1="0"  y1="16" x2="300" y2="16"/>
      <line class="av-grid" x1="0"  y1="32" x2="300" y2="32"/>
      <line class="av-grid" x1="0"  y1="48" x2="300" y2="48"/>

      <!-- area fill -->
      <path class="av-area"
            d="M0,46 L40,40 L80,44 L120,30 L160,34 L200,22 L240,26 L300,10 L300,64 L0,64 Z"/>

      <!-- line -->
      <path class="av-line"
            d="M0,46 L40,40 L80,44 L120,30 L160,34 L200,22 L240,26 L300,10"/>

      <!-- end dot -->
      <circle class="av-dot" cx="300" cy="10" r="3"/>
    </svg>
  </div>

</div>
